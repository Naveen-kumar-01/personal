<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>GJU Image Finder</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    color:white;
    font-family:Arial, sans-serif;
    height:100vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

.topbar{
    width:100%;
    padding:15px;
    background:#181818;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    align-items:center;
    border-bottom:1px solid #333;
}

input{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
    font-size:16px;
    width:180px;
    outline:none;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#00b894;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.viewer{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
}

img{
    max-width:95%;
    max-height:90%;
    object-fit:contain;
    border-radius:12px;
    background:white;
}

.status{
    position:absolute;
    bottom:20px;
    background:rgba(0,0,0,0.7);
    padding:10px 18px;
    border-radius:12px;
    font-size:18px;
    backdrop-filter:blur(5px);
}

.hint{
    position:absolute;
    top:15px;
    background:rgba(0,0,0,0.6);
    padding:8px 14px;
    border-radius:10px;
    font-size:14px;
    color:#ddd;
}

@media(max-width:600px){

    .topbar{
        flex-direction:column;
        padding:12px;
    }

    input{
        width:100%;
    }

    button{
        width:100%;
    }

    .status{
        font-size:16px;
        bottom:15px;
    }

}

</style>
</head>

<body>

<div class="topbar">

    <input 
        type="number"
        id="yearInput"
        placeholder="Year (2024)"
    >

    <input 
        type="text"
        id="rollInput"
        placeholder="Full Roll Number"
    >

    <button onclick="startFinder()">
        Run
    </button>

</div>

<div class="viewer">

    <div class="hint">
        Swipe ← → or use keyboard arrows
    </div>

    <img id="pic" src="">

    <div class="status" id="status">
        Waiting...
    </div>

</div>

<script>

let currentRoll = 0;
let currentYear = "";
let loading = false;

const pic = document.getElementById("pic");
const statusText = document.getElementById("status");

function startFinder(){

    currentYear = document.getElementById("yearInput").value.trim();

    currentRoll = document.getElementById("rollInput").value.trim();

    if(!currentYear || !currentRoll){

        alert("Enter year and roll number");

        return;
    }

    currentRoll = parseInt(currentRoll);

    loadImage(currentRoll);
}

function loadImage(roll){

    if(loading) return;

    loading = true;

    statusText.innerText = `Loading ${roll}...`;

    let url = `https://gjuonline.ac.in/gjust/uploads/photo/dept/${currentYear}/${roll}.jpg?t=${Date.now()}`;

    let temp = new Image();

    temp.onload = () => {

        pic.src = url;

        statusText.innerText = `FOUND : ${roll}`;

        loading = false;
    };

    temp.onerror = () => {

        pic.src = "";

        statusText.innerText = `NOT FOUND : ${roll}`;

        loading = false;
    };

    temp.src = url;
}

function nextImage(){

    if(loading) return;

    currentRoll++;

    loadImage(currentRoll);
}

function prevImage(){

    if(loading) return;

    currentRoll--;

    loadImage(currentRoll);
}

document.addEventListener("keydown", e => {

    if(e.key === "ArrowRight" || e.key === "Enter"){
        nextImage();
    }

    if(e.key === "ArrowLeft"){
        prevImage();
    }

});



// MOBILE SWIPE SUPPORT

let touchStartX = 0;
let touchEndX = 0;

document.addEventListener("touchstart", e => {

    touchStartX = e.changedTouches[0].screenX;

});

document.addEventListener("touchend", e => {

    touchEndX = e.changedTouches[0].screenX;

    handleSwipe();

});

function handleSwipe(){

    let diff = touchStartX - touchEndX;

    if(Math.abs(diff) < 40) return;

    if(diff > 0){

        nextImage();

    }else{

        prevImage();
    }
}

</script>

</body>
</html>
